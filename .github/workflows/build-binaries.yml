name: Build CLI Binaries & Publish Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # permite rodar manualmente sem tag

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: claude-sync-win32.exe
            artifact: win32
          - os: macos-latest
            output: claude-sync-darwin
            artifact: darwin
          - os: ubuntu-latest
            output: claude-sync-linux
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build binary
        run: |
          python -m PyInstaller --onefile --name ${{ matrix.output }} --distpath ./dist claude_context_sync/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.output }}

  package-extension:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: vscode-extension/bin

      - name: Flatten bin directory
        run: |
          mv vscode-extension/bin/win32/claude-sync-win32.exe vscode-extension/bin/
          mv vscode-extension/bin/darwin/claude-sync-darwin vscode-extension/bin/
          mv vscode-extension/bin/linux/claude-sync-linux vscode-extension/bin/
          rm -rf vscode-extension/bin/win32 vscode-extension/bin/darwin vscode-extension/bin/linux
          chmod +x vscode-extension/bin/claude-sync-darwin vscode-extension/bin/claude-sync-linux

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install extension dependencies
        run: cd vscode-extension && npm install

      - name: Compile TypeScript
        run: cd vscode-extension && npx tsc -p ./

      - name: Package extension
        run: cd vscode-extension && npx @vscode/vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-extension/*.vsix

      # Publish only when triggered by a version tag (v*)
      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd vscode-extension && npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
